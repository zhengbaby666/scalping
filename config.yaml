api:
#  base_url: "https://pro.apex.exchange"   # Apex Pro 主网 REST 地址
  base_url: "https://testnet.pro.apex.exchange"   # Apex Pro 测试网 REST 地址
  ws_url: "wss://pro.apex.exchange/realtime"  # WebSocket 地址
  api_key: ""        # 填入你的 API Key
  api_secret: ""     # 填入你的 API Secret
  passphrase: ""     # 填入你的 Passphrase
  l2_key: ""         # 填入你的 StarkEx L2 私钥（如需链上签名）

  # WebSocket 重连参数（一般无需修改）
  ws_max_reconnect_interval_sec: 30  # 最大退避间隔（秒）
  ws_ping_interval_sec: 20           # Ping 发送间隔（秒）
  ws_pong_timeout_sec: 10            # Pong 超时时间（秒），超时则主动断线重连

# 交易对（Apex Pro 格式，例如 BTC-USDC PERP）
symbol: "BTC-USDC"

strategy:
  # 挂单偏移 tick 数（相对于买一/卖一价向内收紧）
  # 例如 spread_ticks=1，tick_size=0.1 → 买单在 bid+0.1，卖单在 ask-0.1
  spread_ticks: 1

  # 单笔下单量（合约张数）
  order_size: 0.001

  # 最大净持仓量（超过后停止同向开仓）
  max_position: 0.01

  # 挂单刷新间隔（毫秒）
  refresh_interval_ms: 500

  # 盈利目标（USDC，达到后程序自动退出）
  take_profit_usdc: 50.0

  # 止损（USDC，超过后程序自动退出）
  stop_loss_usdc: 20.0

  # 最小价差阈值（USDC，低于此值不挂单）
  min_spread_usdc: 0.5

  # 价格精度（小数位数）
  price_precision: 1

  # 数量精度（小数位数）
  size_precision: 3

risk_control:
  # 单日最大亏损（USDC）
  # 当日累计亏损超过此值，触发熔断，停止所有下单
  max_daily_loss_usdc: 30.0

  # 最大连续亏损次数
  # 连续亏损超过此次数，触发熔断，需人工重置
  max_consecutive_loss: 5

  # 账户最低可用余额（USDC）
  # 可用余额低于此值，触发熔断，停止所有下单
  min_balance_usdc: 100.0

# ---- 趋势过滤（防止单边行情被碾压）----
# 原理：双 EMA 交叉判断趋势方向
#   上升趋势 → 只挂买单（不挂卖单，避免逆势做空）
#   下降趋势 → 只挂卖单（不挂买单，避免逆势做多）
#   横盘     → 双边挂单（正常做市）
trend_filter:
  enabled: true

  # K 线聚合周期（秒）
  # 60 = 1 分钟 K 线，推荐 60~300
  candle_period_sec: 60

  # 快线 EMA 周期（K 线数）
  fast_ema_period: 9

  # 慢线 EMA 周期（K 线数）
  slow_ema_period: 21

  # 趋势判断阈值（EMA 偏离比例）
  # 0.0003 = 快线偏离慢线 0.03% 才认定为趋势，防止频繁切换
  threshold: 0.0003

# ---- 动态 Spread（ATR 自适应）----
# 原理：根据市场波动率（ATR）动态调整挂单偏移量
#   波动大 → spread 变宽（保守，避免被扫单）
#   波动小 → spread 变窄（激进，提高成交率）
dynamic_spread:
  enabled: true

  # ATR 周期（K 线数）
  atr_period: 14

  # ATR 乘数：动态 spread_ticks = round(ATR × multiplier / tick_size)
  # 例如 ATR=50 USDC，multiplier=0.1，tick_size=0.1 → spread_ticks = 50
  # 建议从 0.05~0.2 开始调试
  multiplier: 0.1

  # 最小 spread（tick 数），防止 ATR 过小时挂单太激进
  min_ticks: 1

  # 最大 spread（tick 数），防止 ATR 过大时挂单太保守
  max_ticks: 20
